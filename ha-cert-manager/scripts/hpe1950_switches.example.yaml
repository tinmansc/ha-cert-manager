# HPE 1950 Switch Inventory for HA Cert Manager
#
# Copy this file to /config/scripts/hpe1950_switches.yaml and fill in your switches.
# The switch name key (e.g. "LoftPoESwitch") must match the device name you set
# in the HA Cert Manager device list exactly.
#
# Fields:
#   host          — FQDN used as the TLS SNI name when checking the served cert
#   ip            — IP address used for SSH/SFTP connections
#   pki_domain    — Comware PKI domain name (must already exist on the switch)
#   ssl_policy    — Comware SSL server policy name
#   startup_config — flash:/ path where the switch saves its running config

switches:
  LoftPoESwitch:
    host: loftpoeswitch.example.com
    ip: 192.168.1.1
    pki_domain: hp-1950
    ssl_policy: hp-1950
    startup_config: flash:/startup.cfg

  ScottDeskSwitch:
    host: scottdeskswitch.example.com
    ip: 192.168.1.2
    pki_domain: hp-1950
    ssl_policy: hp-1950
    startup_config: flash:/startup.cfg
