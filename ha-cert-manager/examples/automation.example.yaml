# Trigger the cert manager to deploy to all devices after Let's Encrypt renews.
# Attach this action to your existing Let's Encrypt automation.
#
# The app slug is "ha_cert_manager" — so the local app ID is "local_ha_cert_manager".

automation:
  alias: "Deploy certs after Let's Encrypt renewal"
  trigger:
    # Option A: trigger when Let's Encrypt app finishes
    - platform: event
      event_type: hassio_app_stopped
      event_data:
        slug: core_letsencrypt

    # Option B: schedule — 03:05 on the 1st of each month (5 min after LE runs)
    # - platform: time
    #   at: "03:05:00"
    #   conditions:
    #     - condition: template
    #       value_template: "{{ now().day == 1 }}"

  action:
    - action: hassio.app_start
      data:
        app: local_ha_cert_manager
