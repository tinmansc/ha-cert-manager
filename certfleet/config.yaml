name: "CertFleet"
description: "Unified Let's Encrypt certificate deployment dashboard for all your network devices."
version: "1.5.0"
slug: "certfleet"
init: false
arch:
  - aarch64
  - amd64
homeassistant_api: false
hassio_api: true
ingress: true
ingress_port: 8099
panel_icon: mdi:certificate
panel_title: CertFleet

options: {}
schema: {}

url: "https://github.com/tinmansc/CertFleet"

# image: ghcr.io/tinmansc/certfleet
# ^ Commented out so Home Assistant builds this add-on LOCALLY from the
#   Dockerfile (self-contained: it builds the frontend too). With this line
#   present the Supervisor pulls the pre-built image instead of building.
#   Re-enable it when distributing a pre-built multi-arch image (e.g. the
#   GitHub Actions build publishing to ghcr.io) rather than local builds.

map:
  - ssl:ro
  - config:rw
